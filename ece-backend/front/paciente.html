<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Paciente - ECE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#000a1e",
                        "primary-container": "#002147",
                        secondary: "#0059bb",
                        "secondary-container": "#0070ea",
                        "tertiary-fixed-dim": "#00daf3",
                        surface: "#faf9fd",
                        "surface-container": "#efedf1",
                        "surface-container-low": "#f4f3f7",
                        "on-surface": "#1a1b1e",
                        "on-surface-variant": "#44474e",
                        error: "#ba1a1a",
                        "error-container": "#ffdad6"
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"]
                    }
                }
            }
        };
    </script>
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 10%, rgba(0, 112, 234, 0.14), transparent 28%),
                radial-gradient(circle at 85% 20%, rgba(0, 218, 243, 0.12), transparent 26%),
                #faf9fd;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.58);
            box-shadow: 0 24px 60px rgba(0, 10, 30, 0.08);
            backdrop-filter: blur(20px);
        }

        .medical-grid-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 10, 30, 0.07) 1px, transparent 0);
            background-size: 32px 32px;
        }

        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="font-sans text-on-surface medical-grid-bg">
    <header class="sticky top-0 z-40 border-b border-white/40 bg-white/80 backdrop-blur-xl">
        <div class="mx-auto flex max-w-[1440px] items-center justify-between px-6 py-4">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary text-3xl">account_balance</span>
                <div>
                    <h1 class="text-xl font-bold text-primary">Secretaria de Salud</h1>
                    <p id="portalLabel" class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant">Portal del Paciente</p>
                </div>
            </div>
            <button id="logoutButton" class="rounded-xl bg-primary px-3 py-2 text-xs font-bold text-white">Cerrar sesion</button>
        </div>
    </header>

    <main class="mx-auto max-w-[1180px] space-y-6 px-6 py-6">
        <section class="glass-panel rounded-3xl p-6">
            <p id="portalEyebrow" class="text-xs font-bold uppercase tracking-widest text-secondary">Mi expediente clinico</p>
            <h2 id="patientTitle" class="mt-1 text-3xl font-bold text-primary">Cargando expediente...</h2>
            <p id="patientSubtitle" class="mt-1 text-sm text-on-surface-variant">Consulta y administra el acceso a tu expediente.</p>
            <div id="sessionBanner" class="mt-4 hidden rounded-2xl bg-surface-container-low px-4 py-3 text-sm font-semibold text-primary"></div>
            <div id="message" class="mt-4 hidden rounded-xl px-4 py-3 text-sm font-semibold"></div>
        </section>

        <nav id="tutorTabs" class="glass-panel hidden flex-wrap gap-2 rounded-3xl p-3">
            <button id="ownProfileTab" class="rounded-2xl bg-secondary-container px-4 py-3 text-sm font-bold text-white">
                Mi expediente personal
            </button>
            <div id="minorTabs" class="flex flex-wrap gap-2"></div>
        </nav>

        <section id="dashboard" class="hidden grid gap-6 lg:grid-cols-[1fr_380px]">
            <div class="space-y-6">
                <article class="glass-panel rounded-3xl p-6">
                    <h3 class="text-xl font-bold text-primary">Datos generales</h3>
                    <div id="summaryGrid" class="mt-4 grid gap-4 md:grid-cols-2"></div>
                </article>

                <article class="glass-panel rounded-3xl p-6">
                    <h3 class="text-xl font-bold text-primary">Historial clinico</h3>
                    <div id="consultationList" class="mt-4 space-y-4"></div>
                </article>
            </div>

            <aside class="space-y-6">
                <article class="rounded-3xl bg-primary p-6 text-white">
                    <span class="material-symbols-outlined text-5xl text-tertiary-fixed-dim">fingerprint</span>
                    <h3 id="accessTitle" class="mt-4 text-xl font-bold">Autorizacion de acceso</h3>
                    <p id="accessText" class="mt-2 text-sm text-white/75">Cargando permiso vigente...</p>
                    <button id="authorizeButton" class="mt-5 w-full rounded-xl bg-tertiary-fixed-dim px-4 py-3 font-bold text-primary">Autorizar con biometria</button>
                    <button id="revokeButton" class="mt-3 w-full rounded-xl border border-white/20 px-4 py-3 font-bold text-white">Revocar acceso</button>
                </article>

                <article class="glass-panel rounded-3xl p-6">
                    <h3 class="text-xl font-bold text-primary">Historial de accesos</h3>
                    <div id="accessHistory" class="mt-4 space-y-3"></div>
                </article>
            </aside>
        </section>
    </main>

    <script>
        const API_URL = "http://localhost:8080";
        const token = sessionStorage.getItem("eceToken") || "";
        const role = sessionStorage.getItem("eceRole") || "";
        const actorRole = sessionStorage.getItem("eceActorRole") || "";
        const actorName = sessionStorage.getItem("eceName") || "";
        const curp = sessionStorage.getItem("eceCurp") || "";
        let expedienteActual = null;
        let expedientePersonal = null;
        let menoresBajoTutela = [];
        let vistaTutelaActiva = false;
        const $ = (id) => document.getElementById(id);

        $("logoutButton").addEventListener("click", cerrarSesion);
        $("authorizeButton").addEventListener("click", autorizarAcceso);
        $("revokeButton").addEventListener("click", revocarAcceso);
        $("ownProfileTab").addEventListener("click", () => {
            vistaTutelaActiva = false;
            renderExpediente(expedientePersonal);
            renderTutorTabs();
        });

        if (!token) {
            window.location.href = "login.html";
        } else if (role !== "Patient") {
            window.location.href = "index.html";
        } else {
            cargarMiExpediente();
        }

        async function cargarMiExpediente() {
            try {
                const response = await fetch(`${API_URL}/api/expedientes/${encodeURIComponent(curp)}`, {
                    headers: { Authorization: `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error("No se pudo cargar tu expediente.");
                }

                const expediente = await response.json();
                expedientePersonal = expediente;
                vistaTutelaActiva = false;
                renderExpediente(expedientePersonal);

                if (actorRole === "Tutor") {
                    await cargarMenoresBajoTutela();
                }
            } catch (error) {
                setMessage(error.message, "error");
            }
        }

        async function cargarMenoresBajoTutela() {
            const response = await fetch(`${API_URL}/api/expedientes/tutores/${encodeURIComponent(curp)}/menores`, {
                headers: { Authorization: `Bearer ${token}` }
            });

            if (!response.ok) {
                throw new Error("No se pudieron cargar los menores bajo tutela.");
            }

            menoresBajoTutela = await response.json();
            $("tutorTabs").classList.remove("hidden");
            $("tutorTabs").classList.add("flex");
            renderTutorTabs();
        }

        function renderTutorTabs() {
            $("ownProfileTab").className = vistaTutelaActiva
                ? "rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-primary"
                : "rounded-2xl bg-secondary-container px-4 py-3 text-sm font-bold text-white";

            $("minorTabs").innerHTML = menoresBajoTutela.map((menor) => `
                <button class="rounded-2xl ${vistaTutelaActiva && expedienteActual?.curpPaciente === menor.curpPaciente ? "bg-secondary-container text-white" : "border border-slate-200 bg-white text-primary"} px-4 py-3 text-sm font-bold"
                        onclick="abrirMenorTutela('${menor.curpPaciente}')">
                    Perfil bajo tutela: ${menor.nombreCompleto}
                </button>
            `).join("");
        }

        function abrirMenorTutela(curpMenor) {
            const menor = menoresBajoTutela.find((item) => item.curpPaciente === curpMenor);
            if (!menor) {
                setMessage("No se encontro el expediente bajo tutela.", "error");
                return;
            }

            vistaTutelaActiva = true;
            renderExpediente(menor);
            renderTutorTabs();
        }

        async function apiPost(path) {
            const response = await fetch(`${API_URL}${path}`, {
                method: "POST",
                headers: {
                    Authorization: `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                body: "{}"
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || "No se pudo actualizar el permiso.");
            }

            return response.json();
        }

        function renderExpediente(exp) {
            const esMenorConTutor = Boolean(exp.tutor);
            const esTutor = actorRole === "Tutor";
            const esMenor = actorRole === "Menor";
            $("dashboard").classList.remove("hidden");
            expedienteActual = exp;
            $("portalLabel").textContent = esTutor ? "Portal del Tutor" : "Portal del Paciente";
            $("portalEyebrow").textContent = esTutor && vistaTutelaActiva ? "Expediente clinico bajo tutela" : "Mi expediente clinico";
            $("patientTitle").textContent = exp.nombreCompleto;
            $("patientSubtitle").textContent = `${exp.curpPaciente} | ${exp.edad || "Edad no registrada"} anos | ${exp.tipoSangre || "Tipo sangre no registrado"}`;
            $("sessionBanner").classList.toggle("hidden", !(esTutor || esMenor));
            $("sessionBanner").textContent = esTutor
                ? (vistaTutelaActiva
                    ? `Sesion activa del tutor legal: ${actorName}. Administrando el expediente de ${exp.nombreCompleto}.`
                    : `Sesion activa del tutor legal: ${actorName}. Este es tu expediente personal.`)
                : (esMenor ? "Modo consulta de menor de edad. La autorizacion de accesos corresponde al tutor legal." : "");

            const rows = [
                ["CURP", exp.curpPaciente],
                ["Fecha de nacimiento", exp.fechaNacimiento || "No registrada"],
                ["Sexo", exp.sexo || "No registrado"],
                ["Domicilio", exp.domicilio || "No registrado"],
                ["Tipo de sangre", exp.tipoSangre || "No registrado"],
                ["Biometria", `${exp.biometriaPaciente?.tipo || "N/A"} - ${exp.biometriaPaciente?.estado || "N/A"}`],
                ["Alergias", (exp.alergias || []).join(", ") || "Sin alergias"],
                ["Responsable de autorizacion", exp.tutor ? `${exp.tutor.nombreCompleto} (${exp.tutor.parentesco})` : "Paciente mayor de edad"],
                ["Notas", exp.notasClinicas || "Sin notas"]
            ];

            $("summaryGrid").innerHTML = rows.map(([label, value]) => `
                <div class="rounded-2xl bg-surface-container-low p-4">
                    <p class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">${label}</p>
                    <p class="mt-2 font-semibold text-primary">${value}</p>
                </div>
            `).join("");

            $("consultationList").innerHTML = (exp.consultas || []).map((c) => `
                <article class="rounded-2xl border border-slate-200 bg-white/70 p-4">
                    <h4 class="font-bold text-primary">${c.diagnostico}</h4>
                    <p class="text-sm text-on-surface-variant">${c.fecha} | ${c.medico}</p>
                    <p class="mt-2 text-sm">${c.tratamiento}</p>
                </article>
            `).join("");

            const medico = exp.medicoAutorizado || {};
            const estado = medico.estadoAcceso || "Sin solicitud";
            const puedeGestionarAcceso = !esMenor && (!esMenorConTutor || (esTutor && vistaTutelaActiva));
            $("accessTitle").textContent = esMenorConTutor ? "Autorizacion del tutor" : "Autorizacion de acceso";
            $("accessText").textContent = describirAcceso(exp, medico, estado, esMenorConTutor, puedeGestionarAcceso);
            $("authorizeButton").disabled = !puedeGestionarAcceso || estado === "Autorizado" || estado === "Sin solicitud";
            $("authorizeButton").textContent = estado === "Autorizado"
                ? (esMenorConTutor ? "Acceso del menor autorizado" : "Acceso autorizado")
                : (esMenorConTutor ? "Autorizar acceso del menor" : "Autorizar con biometria");
            $("revokeButton").disabled = !puedeGestionarAcceso || estado === "Revocado" || estado === "Sin solicitud";
            $("revokeButton").textContent = esMenorConTutor ? "Revocar acceso del menor" : "Revocar acceso";
            aplicarEstadoBoton($("authorizeButton"), "principal");
            aplicarEstadoBoton($("revokeButton"), "secundario");

            $("accessHistory").innerHTML = (exp.historialAccesos || []).map((a) => `
                <div class="rounded-2xl bg-surface-container-low p-4">
                    <p class="font-bold text-primary">${a.accion}</p>
                    <p class="text-sm text-on-surface-variant">${a.actor} | ${a.rol}</p>
                    <p class="mt-1 font-mono text-xs text-on-surface-variant">${a.fechaHora}</p>
                </div>
            `).join("");
        }

        function describirAcceso(exp, medico, estado, esMenorConTutor, puedeGestionarAcceso) {
            const medicoNombre = medico.nombreCompleto || "Medico no asignado";
            const motivo = medico.motivoAcceso || "consulta medica";

            if (!puedeGestionarAcceso && esMenorConTutor) {
                return `El expediente de ${exp.nombreCompleto} requiere autorizacion de ${exp.tutor?.nombreCompleto || "su tutor legal"} para conceder o revocar accesos. Estado actual: ${estado}.`;
            }

            if (!esMenorConTutor) {
                return `${medicoNombre} solicita acceso por: ${motivo}. Estado: ${estado}.`;
            }

            if (estado === "Autorizado") {
                return `El acceso al expediente de ${exp.nombreCompleto} para ${medicoNombre} ya fue autorizado por ${exp.tutor?.nombreCompleto || "el tutor legal"}. Estado: ${estado}.`;
            }

            if (estado === "Revocado") {
                return `El acceso al expediente de ${exp.nombreCompleto} fue revocado por el tutor legal. Estado: ${estado}.`;
            }

            return `${medicoNombre} solicita acceso al expediente de ${exp.nombreCompleto} por: ${motivo}. La autorizacion debe realizarla ${exp.tutor?.nombreCompleto || "el tutor legal"}. Estado: ${estado}.`;
        }

        function aplicarEstadoBoton(button, tipo) {
            const deshabilitado = button.disabled;
            button.classList.toggle("cursor-not-allowed", deshabilitado);
            button.classList.toggle("opacity-70", deshabilitado);

            if (tipo === "principal") {
                button.classList.toggle("bg-tertiary-fixed-dim", !deshabilitado);
                button.classList.toggle("text-primary", !deshabilitado);
                button.classList.toggle("bg-surface-container", deshabilitado);
                button.classList.toggle("text-on-surface-variant", deshabilitado);
            }

            if (tipo === "secundario") {
                button.classList.toggle("opacity-50", deshabilitado);
            }
        }

        function setMessage(text, type) {
            $("message").textContent = text;
            $("message").className = type === "error"
                ? "mt-4 rounded-xl bg-error-container px-4 py-3 text-sm font-semibold text-error"
                : "mt-4 rounded-xl bg-emerald-100 px-4 py-3 text-sm font-semibold text-emerald-800";
        }

        async function autorizarAcceso() {
            if (!expedienteActual) {
                setMessage("Primero carga tu expediente.", "error");
                return;
            }

            if (actorRole === "Menor") {
                setMessage("Los menores de edad no pueden autorizar accesos. Debe hacerlo su tutor legal.", "error");
                return;
            }

            const button = $("authorizeButton");
            button.disabled = true;
            const esTutor = actorRole === "Tutor" && vistaTutelaActiva;
            button.textContent = esTutor ? "Leyendo huella del tutor..." : "Leyendo huella...";
            setMessage(esTutor ? "Validando biometria del tutor legal..." : "Validando biometria del paciente...", "ok");

            try {
                await new Promise((resolve) => setTimeout(resolve, 1300));
                expedienteActual = await apiPost(`/api/expedientes/${encodeURIComponent(expedienteActual.curpPaciente)}/autorizar-acceso`);
                renderExpediente(expedienteActual);
                setMessage(esTutor ? "Biometria del tutor validada. Acceso del menor autorizado y guardado en el expediente." : "Biometria validada. Acceso autorizado y guardado en el expediente.", "ok");
            } catch (error) {
                setMessage(error.message, "error");
                button.disabled = false;
                button.textContent = esTutor ? "Autorizar acceso del menor" : "Autorizar con biometria";
            }
        }

        async function revocarAcceso() {
            if (!expedienteActual) {
                setMessage("Primero carga tu expediente.", "error");
                return;
            }

            if (actorRole === "Menor") {
                setMessage("Los menores de edad no pueden revocar accesos. Debe hacerlo su tutor legal.", "error");
                return;
            }

            const button = $("revokeButton");
            button.disabled = true;
            button.textContent = "Revocando...";

            try {
                expedienteActual = await apiPost(`/api/expedientes/${encodeURIComponent(expedienteActual.curpPaciente)}/revocar-acceso`);
                renderExpediente(expedienteActual);
                setMessage("Acceso revocado y guardado en el expediente.", "ok");
            } catch (error) {
                setMessage(error.message, "error");
            } finally {
                button.textContent = "Revocar acceso";
            }
        }

        function cerrarSesion() {
            sessionStorage.removeItem("eceToken");
            sessionStorage.removeItem("eceRole");
            sessionStorage.removeItem("eceName");
            sessionStorage.removeItem("eceCurp");
            sessionStorage.removeItem("eceCedula");
            sessionStorage.removeItem("eceEspecialidad");
            sessionStorage.removeItem("eceInstitucion");
            sessionStorage.removeItem("eceActorRole");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
