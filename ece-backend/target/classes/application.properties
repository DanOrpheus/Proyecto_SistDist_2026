# Base de datos
quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database=ece_nacional

# Seguridad CORS (Permitir todo)
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.methods=GET, POST, OPTIONS

# =========================
# JWT
# =========================

# Llave pública para validar tokens
mp.jwt.verify.publickey.location=classpath:publicKey.pem

# Llave privada para firmar tokens
smallrye.jwt.sign.key.location=classpath:privateKey.pem

# Recursos incluidos
quarkus.native.resources.includes=publicKey.pem

# Emisor del token
mp.jwt.verify.issuer=ece-backend